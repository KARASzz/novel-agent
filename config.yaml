# 番茄小说一键制造机配置
project:
  platform: "fanqie_novel"
  product_name: "番茄小说一键制造机"

llm:
  model_slot: "model_slot_1"
  api_key_env: "MINIMAX_API_KEY"
  base_url: "https://api.minimaxi.com/v1"
  model: "MiniMax-M2.7"
  timeout: 300
  max_retries: 3
  strict_validation: true
  tools:
    web_search: false
    web_extractor: false
    code_interpreter: false
    file_search: false
    enable_thinking: false
  enable_rag: true
  retry:
    base_delay_sec: 1.0
    max_delay_sec: 8.0
    jitter_sec: 0.25

logging:
  log_level: "INFO"

rag:
  backend: "local"
  workspace_id_env: "WORKSPACE_ID"
  index_id_env: "BAILIAN_INDEX_ID"
  default_query: "番茄小说开篇节奏、追读钩子、爽点外化、章节推进、读者留存"
  top_k: 2
  max_candidates: 120
  snippet_chars: 500
  # RAG三库配置
  triple_kb:
    market_ttl_days: 30    # 市场时效库30天过期
    common_ttl_days: 180   # 常识库半年过期
    project_ttl_days: 0     # 项目库永不过期

# 前置决策中台配置
pre_hub:
  # Layer0: 信源净化
  source_guard:
    min_published_days: 90  # 禁止使用90天前的数据
    tiers:
      official: 0.95
      mainstream: 0.80
      third_party: 0.70
      industry_media: 0.50
      self_media: 0.30

  # Layer1: 市场雷达
  market_radar:
    bayesian_threshold: 0.65  # 新鲜度可接受下限

  # Layer3: 路由决策
  router:
    tot_routes: 3  # ToT并行数
    min_score_threshold: 60  # 最低准入分

  # Layer6: 对抗验证
  adversarial:
    must_pass_checks: 8  # 10项检查至少通过8项

  # Layer7: 准入门
  admission:
    passport_ttl_days: 14  # 准入护照有效期

cache:
  chapter_snapshot_ttl_days: 180

models:
  default_slot: "model_slot_1"
  slots:
    model_slot_1:
      display_name: "MINIMAX-M2.7"
      base_url: "https://api.minimaxi.com/v1"
      api_key_env: "MINIMAX_API_KEY"
      model_id: "MiniMax-M2.7"
      enabled: true
      note: "MINIMAX OpenAI 兼容接口，API Key 从本机 MINIMAX_API_KEY 环境变量读取。"
    model_slot_2:
      display_name: "阿里云百炼 Kimi K2.6"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key_env: "DASHSCOPE_API_KEY"
      model_id: "kimi-k2.6"
      enabled: true
      note: "阿里云百炼 OpenAI 兼容接口，API Key 从本机 DASHSCOPE_API_KEY 环境变量读取。"
    model_slot_3:
      display_name: "模型占位 3"
      base_url: ""
      api_key_env: "MODEL_SLOT_3_API_KEY"
      model_id: "model-slot-3"
      enabled: false
      note: "预留 OpenAI Chat Completions 模型接口，后续接入真实模型。"
    model_slot_4:
      display_name: "模型占位 4"
      base_url: ""
      api_key_env: "MODEL_SLOT_4_API_KEY"
      model_id: "model-slot-4"
      enabled: false
      note: "预留 OpenAI Chat Completions 模型接口，后续接入真实模型。"
    model_slot_5:
      display_name: "模型占位 5"
      base_url: ""
      api_key_env: "MODEL_SLOT_5_API_KEY"
      model_id: "model-slot-5"
      enabled: false
      note: "预留 OpenAI Chat Completions 模型接口，后续接入真实模型。"
